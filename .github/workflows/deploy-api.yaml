name: Subir la API a Docker Hub (receta reutilizable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Cómo se llamará la imagen en Docker Hub
        required: true
        type: string

      image-tag:
        description: Etiqueta que identifica esta versión
        required: true
        type: string

      k3s-server-public-ip:
        description: IP pública del servidor K3S
        required: true
        type: string

    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EA2_SSH_PRIVATE_KEY:
        required: true

  workflow_dispatch:
    inputs:
      image-name:
        description: Nombre corto de la imagen
        required: true
        type: string

      image-tag:
        description: Etiqueta de esta versión
        required: true
        type: string

      k3s-server-public-ip:
        description: IP pública del servidor K3S
        required: true
        type: string

jobs:
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test

  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push imagen
        run: |
          IMAGEN="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"

          docker build \
            -t "${IMAGEN}:${{ inputs.image-tag }}" \
            -t "${IMAGEN}:latest" \
            .

          docker push --all-tags "${IMAGEN}"

  deploy-to-k8s:
    name: Deploy to AWS K3S
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EA2_SSH_PRIVATE_KEY }}

      - name: Verificar conexión SSH
        run: ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} "echo conexión OK"

      - name: Checkout manifests
        uses: actions/checkout@v4

      - name: Copiar k8s al servidor
        run: |
          set -euo pipefail

          test -d k8s || { echo "ERROR: Falta carpeta k8s/"; exit 1; }

          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            'sudo rm -rf /tmp/k8s-deploy'

          scp -o StrictHostKeyChecking=accept-new -r k8s \
            ubuntu@${{ inputs.k3s-server-public-ip }}:/tmp/k8s-deploy

      - name: Deploy + rollout status
        id: deploy
        run: |
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            'sudo k3s kubectl apply -f /tmp/k8s-deploy/ && \
             sudo k3s kubectl rollout status deployment/demo-api --timeout=60s'

      - name: Rollback automático
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            'sudo k3s kubectl rollout undo deployment/demo-api && \
             sudo k3s kubectl rollout status deployment/demo-api --timeout=60s'

      - name: Verificar pods
        run: |
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            'sudo k3s kubectl get pods -o wide'
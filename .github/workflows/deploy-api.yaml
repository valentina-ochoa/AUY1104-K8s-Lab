name: Subir la API a Docker Hub (receta reutilizable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Cómo se llamará la imagen en Docker Hub
        required: true
        type: string

      image-tag:
        description: Etiqueta que identifica esta versión
        required: true
        type: string

      k3s-server-public-ip:
        description: IP pública del servidor K3S
        required: true
        type: string

    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EA2_SSH_PRIVATE_KEY:
        required: true

  workflow_dispatch:
    inputs:
      image-name:
        description: Nombre corto de la imagen
        required: true
        type: string

      image-tag:
        description: Etiqueta de esta versión
        required: true
        type: string

      k3s-server-public-ip:
        description: IP pública del servidor K3S
        required: true
        type: string

jobs:
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest

    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Instalar dependencias
        run: npm install

      - name: 3 · Ejecutar tests
        run: npm test

  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest

    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3 · Armar la imagen y publicarla
        run: |
          IMAGEN_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"

          docker build \
            -t "${IMAGEN_COMPLETA}:${{ inputs.image-tag }}" \
            -t "${IMAGEN_COMPLETA}:latest" \
            .

          docker push --all-tags "${IMAGEN_COMPLETA}"

  deploy-to-k8s:
    name: Deploy to AWS K3S
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EA2_SSH_PRIVATE_KEY }}

      - name: 1 · SSH al servidor K3S
        run: ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" 'echo ok'

      - name: Checkout (manifiestos K8s)
        uses: actions/checkout@v4

      - name: Copiar manifiestos al servidor
        run: |
          set -euo pipefail

          test -d k8s || {
            echo "ERROR: Falta carpeta k8s/ en la raíz del repo"
            exit 1
          }

          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            'sudo rm -rf /tmp/k8s-deploy'

          scp -o StrictHostKeyChecking=accept-new -r k8s \
            "ubuntu@${{ inputs.k3s-server-public-ip }}:/tmp/k8s-deploy"

      - name: Deploy to k3s
        id: deploy
        run: |
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            'sudo k3s kubectl apply -f /tmp/k8s-deploy/ && \
             sudo k3s kubectl rollout status deployment/demo-api --timeout=60s'

      - name: Rollback automático
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${{ inputs.k3s-server-public-ip }}" \
            'sudo k3s kubectl rollout undo deployment/demo-api && \
             sudo k3s kubectl rollout status deployment/demo-api --timeout=60s'
